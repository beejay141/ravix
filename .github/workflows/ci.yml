name: CI

on:
  push:
    branches: [ main ]
    tags: ['v*.*.*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check workspace
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Run tests (all features)
        run: cargo test --workspace --all-features

      - name: Publish `rusta-di-macros`
        run: cargo publish -p rusta-di-macros

      - name: Publish `rusta-di`
        run: cargo publish -p rusta-di

      - name: Publish `rusta-apm`
        run: cargo publish -p rusta-apm

      - name: Publish `rusta-logger`
        run: cargo publish -p rusta-logger

      - name: Publish `rusta`
        run: cargo publish -p rusta

  docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build docs site
        working-directory: ./rusta-docs
        run: |
          npm ci
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./rusta-docs/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
